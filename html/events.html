<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — CampusConnect</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <div class="logo-mark">CC</div>
      <span>CampusConnect</span>
    </a>
    <div class="navbar-right">
      <div class="navbar-user">
        <span id="navbar-user-name">User</span>
        <span id="navbar-user-role" class="user-badge">student</span>
      </div>
      <button id="theme-toggle" class="btn-icon">☀️</button>
      <button id="logout-btn" class="btn-icon btn-logout">⇠ Logout</button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back</button>
        <h1 class="page-title" style="margin-top:0.75rem;">Campus Events</h1>
        <p class="page-subtitle">Stay connected with what's happening around you</p>
        <div class="accent-line"></div>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;color:var(--text-muted);font-size:0.85rem;padding-top:2rem;">
        <span>📅</span>
        <span id="event-count">Loading...</span>
      </div>
    </div>

    <!-- Filter Row -->
    <div class="filter-row">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search events..." oninput="filterEvents()" />
      </div>
      <select class="form-control" id="category-filter" onchange="filterEvents()" style="width:auto;padding:0.6rem 2.2rem 0.6rem 0.9rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font-body);font-size:0.9rem;outline:none;max-width:180px;">
        <option value="">All Categories</option>
        <option value="tech">Technology</option>
        <option value="culture">Culture</option>
        <option value="sports">Sports</option>
        <option value="career">Career</option>
        <option value="wellness">Wellness</option>
        <option value="science">Science</option>
      </select>
    </div>

    <div class="events-grid" id="eventList">
      <!-- Cards injected by JS -->
    </div>

    <div id="empty-events" class="empty-state" style="display:none;">
      <div class="empty-state-icon">🔎</div>
      <div class="empty-state-text">No events match your search.</div>
    </div>
  </div>

  <script>
    const events = [
      { title: "Tech Talk: AI in Education", date: "Sep 22, 2025", desc: "Explore the impact of AI on modern education with industry experts and academic researchers.", category: "tech", emoji: "🤖" },
      { title: "Cultural Fest 2025", date: "Oct 5–7, 2025", desc: "Celebrate cultures from around the world with music, dance, food, and vibrant performances.", category: "culture", emoji: "🎭" },
      { title: "Startup Pitch Day", date: "Sep 30, 2025", desc: "Watch student entrepreneurs pitch their startup ideas to investors and seasoned mentors.", category: "career", emoji: "🚀" },
      { title: "Science Exhibition", date: "Oct 10, 2025", desc: "An exhibition showcasing innovative science projects from our brightest students.", category: "science", emoji: "🔬" },
      { title: "Campus Hackathon", date: "Oct 15–16, 2025", desc: "48 hours of coding, collaboration, and creativity. Build something awesome!", category: "tech", emoji: "💻" },
      { title: "Career Fair", date: "Nov 3, 2025", desc: "Meet top recruiters and explore job and internship opportunities across industries.", category: "career", emoji: "💼" },
      { title: "Mental Health Workshop", date: "Sep 25, 2025", desc: "Learn coping strategies, stress relief techniques, and how to maintain your well-being.", category: "wellness", emoji: "🧠" },
      { title: "Sports Meet 2025", date: "Oct 20–22, 2025", desc: "Compete in track and field, football, basketball, and more. Support your team!", category: "sports", emoji: "🏅" },
      { title: "Photography Contest", date: "Oct 12, 2025", desc: "Capture the campus through your lens and win exciting prizes for the best shots.", category: "culture", emoji: "📷" },
      { title: "Environmental Awareness Drive", date: "Oct 1, 2025", desc: "Join the tree plantation and sustainability awareness activities for a greener campus.", category: "wellness", emoji: "🌿" },
    ];

    const categoryLabels = { tech: "Technology", culture: "Culture", sports: "Sports", career: "Career", wellness: "Wellness", science: "Science" };

    let rendered = [];

    function renderEvents(list) {
      const container = document.getElementById('eventList');
      const empty = document.getElementById('empty-events');
      if (list.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      container.innerHTML = list.map((ev, i) => `
        <div class="event-card" style="animation-delay:${i * 0.05}s">
          <div class="event-card-accent"></div>
          <div class="event-card-body">
            <div class="event-tag">${ev.emoji} ${categoryLabels[ev.category] || ev.category}</div>
            <div class="event-title">${ev.title}</div>
            <div class="event-desc">${ev.desc}</div>
          </div>
          <div class="event-footer">
            <div class="event-date-chip">📅 ${ev.date}</div>
            <button class="btn btn-secondary btn-sm" onclick="registerEvent('${ev.title}', this)">Register</button>
          </div>
        </div>
      `).join('');
    }

    function filterEvents() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const cat = document.getElementById('category-filter').value;
      const filtered = events.filter(e =>
        (!query || e.title.toLowerCase().includes(query) || e.desc.toLowerCase().includes(query)) &&
        (!cat || e.category === cat)
      );
      renderEvents(filtered);
      document.getElementById('event-count').textContent = `${filtered.length} event${filtered.length !== 1 ? 's' : ''}`;
    }

    function registerEvent(title, btn) {
      btn.textContent = '✓ Registered';
      btn.style.color = 'var(--teal)';
      btn.style.borderColor = 'var(--teal)';
      btn.disabled = true;
      Toast.show(`Registered for "${title}"`, 'success');
    }

    document.addEventListener('DOMContentLoaded', () => {
      Auth.requireAuth();
      Auth.initNavbar();
      renderEvents(events);
      document.getElementById('event-count').textContent = `${events.length} events`;
    });
  </script>
</body>
</html>
